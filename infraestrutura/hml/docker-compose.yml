services:
  smtp-teste:
    image: mailhog/mailhog:v1.0.1
    container_name: eickrono-mailhog-hml
    ports:
      - "11025:1025"
      - "18025:8025"
    networks:
      - rede_interna_hml

  servidor-autorizacao:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: eickrono-keycloak-hml
    entrypoint:
      [
        "sh",
        "/opt/keycloak/import-source/render-realms.sh"
      ]
    command:
      [
        "start",
        "--http-enabled=true",
        "--hostname-strict=false",
        "--features=${KEYCLOAK_FEATURES:-instagram-broker}",
        "--spi-theme-static-max-age=-1"
      ]
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: ${KC_DB}
      KC_DB_URL_HOST: ${POSTGRES_HOST}
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_PROXY: ${KC_PROXY}
      KEYCLOAK_IMPORT_REALM_FILE: homologacao-realm.json
      KEYCLOAK_IMPORT_REALM_TARGET_FILE: eickrono-realm.json
      KC_HOSTNAME_URL: ${KEYCLOAK_FRONTEND_URL}
      EICKRONO_PASSWORD_PEPPER: ${EICKRONO_PASSWORD_PEPPER}
      EICKRONO_IDENTIDADE_API_BASE_URL: https://api-identidade-eickrono:8443
      EICKRONO_INTERNAL_SECRET: ${EICKRONO_INTERNAL_SECRET}
      EICKRONO_KEYCLOAK_URL_BASE: http://servidor-autorizacao:8080
      EICKRONO_KEYCLOAK_REALM: eickrono
      EICKRONO_IDENTIDADE_CLIENT_ID_INTERNO: ${EICKRONO_IDENTIDADE_CLIENT_ID_INTERNO:-servidor-autorizacao-interno}
      EICKRONO_IDENTIDADE_CLIENT_SECRET_INTERNO: ${EICKRONO_IDENTIDADE_CLIENT_SECRET_INTERNO:-CHANGE_ME}
      EICKRONO_INTERNO_MTLS_HABILITADO: "true"
      EICKRONO_INTERNO_MTLS_KEYSTORE_ARQUIVO: /certificados/servidor-autorizacao-interno.p12
      EICKRONO_INTERNO_MTLS_KEYSTORE_SENHA: ${MTLS_KEYSTORE_SENHA}
      EICKRONO_INTERNO_MTLS_TRUSTSTORE_ARQUIVO: /certificados/backchannel-truststore.p12
      EICKRONO_INTERNO_MTLS_TRUSTSTORE_SENHA: ${MTLS_TRUSTSTORE_SENHA}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - ../../modulos/servidor-autorizacao-eickrono/target/servidor-autorizacao-eickrono-1.0.0-SNAPSHOT.jar:/opt/keycloak/providers/servidor-autorizacao-eickrono.jar:ro
      - ../../modulos/servidor-autorizacao-eickrono/realms:/opt/keycloak/import-source:ro
      - ../../modulos/servidor-autorizacao-eickrono/temas-login-ptbr:/opt/keycloak/themes/login-ptbr:ro
      - ../../modulos/servidor-autorizacao-eickrono/configuracoes-fapi:/opt/keycloak/providers/configuracoes-fapi:ro
      - ../../modulos/servidor-autorizacao-eickrono/mapeamentos-atributos:/opt/keycloak/providers/mapeamentos-atributos:ro
      - ../../modulos/servidor-autorizacao-eickrono/scripts-spi:/opt/keycloak/providers/scripts-spi:ro
      - ./certificados:/certificados:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rede_interna_hml

  api-identidade-eickrono:
    build:
      context: ../../modulos/api-identidade-eickrono
      dockerfile: Dockerfile
    container_name: eickrono-api-identidade-hml
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: hml
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${IDENTIDADE_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_SCHEMAS: identidade_hml
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${OIDC_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${OIDC_JWKS_URI}
      SEGURANCA_MTLS_HABILITADO: "true"
      SEGURANCA_MTLS_PORTA_INTERNA: 8443
      SEGURANCA_MTLS_KEYSTORE_ARQUIVO: file:/certificados/api-identidade-eickrono.p12
      SEGURANCA_MTLS_KEYSTORE_SENHA: ${MTLS_KEYSTORE_SENHA}
      SEGURANCA_MTLS_TRUSTSTORE_ARQUIVO: file:/certificados/backchannel-truststore.p12
      SEGURANCA_MTLS_TRUSTSTORE_SENHA: ${MTLS_TRUSTSTORE_SENHA}
      IDENTIDADE_API_BASE_URL: http://api-identidade-eickrono:8081
      EICKRONO_INTERNAL_SECRET: ${EICKRONO_INTERNAL_SECRET}
      INTEGRACAO_PERFIL_URL_BASE: ${INTEGRACAO_PERFIL_URL_BASE:-https://host.docker.internal:19483}
      IDENTIDADE_DEVICE_TOKEN_SECRET: ${IDENTIDADE_DEVICE_TOKEN_SECRET}
      IDENTIDADE_CODIGO_TOKEN_SECRET: ${IDENTIDADE_CODIGO_TOKEN_SECRET}
      IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_URL_BASE: http://servidor-autorizacao:8080
      IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_REALM: eickrono
      IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_ID: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_ID}
      INTEGRACAO_PERFIL_JWT_INTERNO_URL_BASE: http://servidor-autorizacao:8080
      INTEGRACAO_PERFIL_JWT_INTERNO_REALM: eickrono
      INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_ID: ${INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_ID:-autenticacao-servidor-interno}
      INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_SECRET: ${INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_SECRET:-CHANGE_ME}
      IDENTIDADE_CADASTRO_EMAIL_FORNECEDOR: ${IDENTIDADE_CADASTRO_EMAIL_FORNECEDOR:-smtp}
      IDENTIDADE_CADASTRO_EMAIL_REMETENTE: ${IDENTIDADE_CADASTRO_EMAIL_REMETENTE:-no-reply-hml@eickrono.local}
      IDENTIDADE_CADASTRO_EMAIL_NOME_APLICACAO: ${IDENTIDADE_CADASTRO_EMAIL_NOME_APLICACAO:-Eickrono HML}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp-teste}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_URL_BASE: http://servidor-autorizacao:8080
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_REALM: eickrono
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      EICKRONO_PASSWORD_PEPPER: ${EICKRONO_PASSWORD_PEPPER}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      SERVIDOR_AUTORIZACAO_MTLS_CERTIFICADO: ${MTLS_CERT_PATH}
      SERVIDOR_AUTORIZACAO_MTLS_SENHA: ${MTLS_CERT_SENHA}
      JAVA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:${API_IDENTIDADE_DEBUG_PORT}"
    ports:
      - "${API_IDENTIDADE_PORT}:8081"
      - "${API_IDENTIDADE_MTLS_PORT}:8443"
      - "${API_IDENTIDADE_DEBUG_PORT}:5005"
    depends_on:
      servidor-autorizacao:
        condition: service_healthy
    volumes:
      - ./certificados:/certificados:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rede_interna_hml

  api-contas-eickrono:
    build:
      context: ../../modulos/api-contas-eickrono
      dockerfile: Dockerfile
    container_name: eickrono-api-contas-hml
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: hml
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${CONTAS_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_SCHEMAS: contas_hml
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${OIDC_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${OIDC_JWKS_URI}
      SEGURANCA_MTLS_HABILITADO: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      SERVIDOR_AUTORIZACAO_MTLS_CERTIFICADO: ${MTLS_CERT_PATH}
      SERVIDOR_AUTORIZACAO_MTLS_SENHA: ${MTLS_CERT_SENHA}
      JAVA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:${API_CONTAS_DEBUG_PORT}"
    ports:
      - "${API_CONTAS_PORT}:8082"
      - "${API_CONTAS_DEBUG_PORT}:5006"
    depends_on:
      servidor-autorizacao:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rede_interna_hml

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: eickrono-otel-collector-hml
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - rede_interna_hml

networks:
  rede_interna_hml:
    driver: bridge
