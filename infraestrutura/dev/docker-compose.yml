services:
  smtp-teste:
    image: mailhog/mailhog:v1.0.1
    container_name: eickrono-mailhog-dev
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - rede_interna_dev

  servidor-autorizacao:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: eickrono-keycloak-dev
    entrypoint:
      [
        "sh",
        "/opt/keycloak/import-source/render-realms.sh"
      ]
    command:
      [
        "start-dev",
        "--hostname=https://oidc-dev.eickrono.online",
        "--hostname-strict=false",
        "--http-enabled=true",
        "--proxy-headers=xforwarded",
        "--features=${KEYCLOAK_FEATURES:-instagram-broker:v1,token-exchange:v1,admin-fine-grained-authz:v1}",
        "--spi-theme-static-max-age=-1"
      ]
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: ${KC_DB}
      KC_DB_URL_HOST: ${KEYCLOAK_POSTGRES_HOST}
      KC_DB_URL_PORT: ${KEYCLOAK_POSTGRES_PORT}
      KC_DB_URL_DATABASE: ${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
      KC_PROXY: ${KC_PROXY}
      KEYCLOAK_IMPORT_REALM_FILE: desenvolvimento-realm.json
      KEYCLOAK_IMPORT_REALM_TARGET_FILE: eickrono-realm.json
      EICKRONO_PASSWORD_PEPPER: ${EICKRONO_PASSWORD_PEPPER}
      EICKRONO_IDENTIDADE_API_BASE_URL: https://api-identidade-eickrono:8443
      EICKRONO_INTERNAL_SECRET: ${EICKRONO_INTERNAL_SECRET}
      EICKRONO_KEYCLOAK_URL_BASE: http://servidor-autorizacao:8080
      EICKRONO_KEYCLOAK_REALM: eickrono
      EICKRONO_IDENTIDADE_CLIENT_ID_INTERNO: ${EICKRONO_IDENTIDADE_CLIENT_ID_INTERNO:-servidor-autorizacao}
      EICKRONO_IDENTIDADE_CLIENT_SECRET_INTERNO: ${EICKRONO_IDENTIDADE_CLIENT_SECRET_INTERNO:-CHANGE_ME}
      EICKRONO_INTERNO_MTLS_HABILITADO: "true"
      EICKRONO_INTERNO_MTLS_KEYSTORE_ARQUIVO: /certificados/servidor-autorizacao.p12
      EICKRONO_INTERNO_MTLS_KEYSTORE_SENHA: ${MTLS_KEYSTORE_SENHA}
      EICKRONO_INTERNO_MTLS_TRUSTSTORE_ARQUIVO: /certificados/backchannel-truststore.p12
      EICKRONO_INTERNO_MTLS_TRUSTSTORE_SENHA: ${MTLS_TRUSTSTORE_SENHA}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - ../../target/eickrono-autenticacao-servidor-1.0.0-SNAPSHOT.jar:/opt/keycloak/providers/eickrono-autenticacao-servidor.jar:ro
      - ../../autorizacao/realms:/opt/keycloak/import-source:ro
      - ../../autorizacao/temas/login-ptbr:/opt/keycloak/themes/login-ptbr:ro
      - ../../autorizacao/providers/configuracoes-fapi:/opt/keycloak/providers/configuracoes-fapi:ro
      - ../../autorizacao/providers/mapeamentos-atributos:/opt/keycloak/providers/mapeamentos-atributos:ro
      - ../../autorizacao/providers/scripts-spi:/opt/keycloak/providers/scripts-spi:ro
      - ./certificados:/certificados:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rede_interna_dev
    # Mantemos o container em execução assim que iniciar; as APIs aguardam apenas a inicialização.

  api-identidade-eickrono:
    build:
      context: ../../../eickrono-identidade-servidor
      dockerfile: Dockerfile
    container_name: eickrono-api-identidade-dev
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://${IDENTIDADE_POSTGRES_HOST}:${IDENTIDADE_POSTGRES_PORT}/${IDENTIDADE_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${IDENTIDADE_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${IDENTIDADE_POSTGRES_PASSWORD}
      SPRING_FLYWAY_SCHEMAS: identidade
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${OIDC_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${OIDC_JWKS_URI}
      IDENTIDADE_API_BASE_URL: http://api-identidade-eickrono:8081
      EICKRONO_INTERNAL_SECRET: ${EICKRONO_INTERNAL_SECRET}
      INTEGRACAO_PERFIL_URL_BASE: ${INTEGRACAO_PERFIL_URL_BASE:-https://host.docker.internal:18483}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_URL_BASE: http://servidor-autorizacao:8080
      IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_REALM: eickrono
      IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_ID: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_ID}
      INTEGRACAO_PERFIL_JWT_INTERNO_URL_BASE: http://servidor-autorizacao:8080
      INTEGRACAO_PERFIL_JWT_INTERNO_REALM: eickrono
      INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_ID: ${INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_ID:-autenticacao-servidor}
      INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_SECRET: ${INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_SECRET:-CHANGE_ME}
      IDENTIDADE_CADASTRO_EMAIL_FORNECEDOR: ${IDENTIDADE_CADASTRO_EMAIL_FORNECEDOR:-smtp}
      IDENTIDADE_CADASTRO_EMAIL_REMETENTE: ${IDENTIDADE_CADASTRO_EMAIL_REMETENTE:-no-reply-dev@eickrono.local}
      IDENTIDADE_CADASTRO_EMAIL_NOME_APLICACAO: ${IDENTIDADE_CADASTRO_EMAIL_NOME_APLICACAO:-Eickrono Dev}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp-teste}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_URL_BASE: http://servidor-autorizacao:8080
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_REALM: eickrono
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      EICKRONO_PASSWORD_PEPPER: ${EICKRONO_PASSWORD_PEPPER}
      SEGURANCA_MTLS_HABILITADO: "true"
      SEGURANCA_MTLS_PORTA_INTERNA: 8443
      SEGURANCA_MTLS_KEYSTORE_ARQUIVO: file:/certificados/api-identidade-eickrono.p12
      SEGURANCA_MTLS_KEYSTORE_SENHA: ${MTLS_KEYSTORE_SENHA}
      SEGURANCA_MTLS_TRUSTSTORE_ARQUIVO: file:/certificados/backchannel-truststore.p12
      SEGURANCA_MTLS_TRUSTSTORE_SENHA: ${MTLS_TRUSTSTORE_SENHA}
      SERVIDOR_AUTORIZACAO_MTLS_CERTIFICADO: ${MTLS_CERT_PATH}
      SERVIDOR_AUTORIZACAO_MTLS_SENHA: ${MTLS_CERT_SENHA}
      JAVA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:${API_IDENTIDADE_DEBUG_PORT}"
    ports:
      - "${API_IDENTIDADE_PORT}:8081"
      - "${API_IDENTIDADE_MTLS_PORT}:8443"
      - "${API_IDENTIDADE_DEBUG_PORT}:5005"
    depends_on:
      servidor-autorizacao:
        condition: service_healthy
    volumes:
      - ./certificados:/certificados:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rede_interna_dev

  api-contas-eickrono:
    build:
      context: ../../../eickrono-contas-servidor
      dockerfile: Dockerfile
    container_name: eickrono-api-contas-dev
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://${CONTAS_POSTGRES_HOST}:${CONTAS_POSTGRES_PORT}/${CONTAS_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${CONTAS_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${CONTAS_POSTGRES_PASSWORD}
      SPRING_FLYWAY_SCHEMAS: contas
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${OIDC_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${OIDC_JWKS_URI}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      SERVIDOR_AUTORIZACAO_MTLS_CERTIFICADO: ${MTLS_CERT_PATH}
      SERVIDOR_AUTORIZACAO_MTLS_SENHA: ${MTLS_CERT_SENHA}
      JAVA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:${API_CONTAS_DEBUG_PORT}"
    ports:
      - "${API_CONTAS_PORT}:8082"
      - "${API_CONTAS_DEBUG_PORT}:5006"
    depends_on:
      servidor-autorizacao:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rede_interna_dev

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: eickrono-otel-collector-dev
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - rede_interna_dev

networks:
  rede_interna_dev:
    driver: bridge
