spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  cache:
    type: none
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/test-issuer

seguranca:
  mtls:
    habilitado: false
  cors:
    origens-permitidas:
      - http://localhost

fapi:
  seguranca:
    audiencia-esperada: api-contas-eickrono-test
    tolerancia-clock-skew-segundos: 60

integracao:
  identidade:
    url-base: http://localhost:8081
